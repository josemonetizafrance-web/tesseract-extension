<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TESSERACT - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dash-container {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(15,15,25,0.9);
            border: 1px solid #8b5cf6;
            border-radius: 4px;
            text-align: center;
        }
        .logo {
            width: 80px; height: 80px; margin: 0 auto 20px;
        }
        .logo svg { width: 100%; height: 100%; }
        h1 {
            font-size: 28px; color: #8b5cf6;
            letter-spacing: 4px; margin-bottom: 8px;
        }
        .subtitle { font-size: 11px; color: #8888a0; letter-spacing: 2px; margin-bottom: 30px; }
        .info { font-size: 12px; color: #8888a0; margin-bottom: 20px; }
        .status-badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 2px; font-size: 11px; font-weight: 600;
            margin-bottom: 20px;
        }
        .status-demo { background: rgba(234,179,8,0.2); color: #fde047; }
        .status-premium { background: rgba(139,92,246,0.2); color: #c4b5fd; }
        .status-expired { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .btn {
            padding: 12px 24px; border: none; border-radius: 2px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            font-weight: 600; letter-spacing: 1px; cursor: pointer; margin: 6px;
        }
        .btn-primary { background: #8b5cf6; color: #fff; }
        .btn-primary:hover { background: #7c3aed; }
        .btn-secondary { background: #333350; color: #e0e0e0; }
        .btn-danger { background: #ef4444; color: #fff; }
        .time-remaining { font-size: 14px; color: #8b5cf6; margin-bottom: 20px; }
        .footer { margin-top: 30px; font-size: 9px; color: #555570; }
    </style>
</head>
<body>
    <div class="dash-container">
        <div class="logo">
            <svg viewBox="0 0 64 64" fill="none">
                <rect x="8" y="8" width="48" height="48" rx="4" stroke="#8b5cf6" stroke-width="2"/>
                <path d="M20 32L28 40L44 24" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>TESSERACT</h1>
        <p class="subtitle">DASHBOARD</p>
        <div class="info" id="user-info">Cargando...</div>
        <div class="status-badge" id="status-badge">--</div>
        <div class="time-remaining" id="time-remaining"></div>
<div>
            <button class="btn btn-primary" id="btn-open-bot">ABRIR BOT PANEL</button>
            <button class="btn btn-secondary" id="btn-support">CONTACTAR SOPORTE</button>
            <button class="btn btn-secondary" id="btn-admin" style="display:none;">ADMIN PANEL</button>
            <button class="btn btn-danger" id="btn-logout">CERRAR SESIÓN</button>
        </div>

        <!-- Support Modal -->
        <div id="support-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:#1a1a2e;padding:30px;border-radius:8px;max-width:450px;width:90%;border:1px solid #8b5cf6;">
                <h3 style="color:#8b5cf6;margin-bottom:20px;">📬 Contactar Soporte</h3>
                <input type="email" id="support-email" placeholder="Tu email de contacto" style="width:100%;padding:10px;margin-bottom:10px;background:#0a0a0f;border:1px solid #333;color:#fff;">
                <input type="text" id="support-subject" placeholder="Asunto (ej: Renovar suscripción)" style="width:100%;padding:10px;margin-bottom:10px;background:#0a0a0f;border:1px solid #333;color:#fff;">
                <textarea id="support-message" placeholder="Escribe tu mensaje..." style="width:100%;height:120px;padding:10px;margin-bottom:15px;background:#0a0a0f;border:1px solid #333;color:#fff;resize:none;"></textarea>
                <div style="text-align:right;">
                    <button class="btn btn-secondary" id="btn-close-support" style="padding:8px 16px;">Cancelar</button>
                    <button class="btn btn-primary" id="btn-send-support" style="padding:8px 16px;">Enviar</button>
                </div>
                <p id="support-status" style="margin-top:15px;font-size:12px;color:#888;"></p>
            </div>
        </div>

        <!-- Blacklist Modal -->
        <div id="blacklist-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:#1a1a2e;padding:30px;border-radius:8px;max-width:500px;width:90%;border:1px solid #8b5cf6;">
                <h3 style="color:#8b5cf6;margin-bottom:15px;">🚫 Lista Negra (Blacklist)</h3>
                <p style="font-size:12px;color:#888;margin-bottom:15px;">Estos contactos NO recibirán mensajes automáticos (Auto Answer, Mailing, Likes, Follows)</p>
                <input type="text" id="blacklist-input" placeholder="Ingresa el ID del contacto" style="width:100%;padding:10px;margin-bottom:10px;background:#0a0a0f;border:1px solid #333;color:#fff;">
                <button class="btn btn-primary" id="btn-add-blacklist" style="padding:8px 16px;width:100%;margin-bottom:15px;">Agregar a Blacklist</button>
                <div id="blacklist-list" style="max-height:200px;overflow-y:auto;background:#0a0a0f;padding:10px;border:1px solid #333;">
                    <p style="color:#666;font-size:11px;text-align:center;">Cargando...</p>
                </div>
                <p id="blacklist-status" style="margin-top:15px;font-size:12px;color:#888;"></p>
                <div style="text-align:right;margin-top:15px;">
                    <button class="btn btn-secondary" id="btn-close-blacklist" style="padding:8px 16px;">Cerrar</button>
                </div>
            </div>
        </div>

        <button class="btn btn-secondary" id="btn-blacklist" style="margin-top:10px;font-size:10px;padding:8px 16px;">⚙️ BLACKLIST</button>
        
        <div class="footer">v22.90 &mdash; 2026 TESSERACT</div>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
